name: Build WSU Production

on:
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub UI
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # TODO: Update to 24 because of deprecation issues.
          node-version: 20 # Match your local dev version

      - name: Cache Dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci # 'npm ci' is cleaner for automated builds

      - name: Build and Make
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare WSU Asset
        shell: pwsh
        run: |
          # Finds the .exe in the out/make folder and renames it
          $exePath = Get-ChildItem -Path out/make/squirrel/win32/x64/*.exe | Select-Object -First 1
          Rename-Item -Path $exePath.FullName -NewName "WSU-Setup.wsu"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/make/squirrel/win32/x64/WSU-Setup.wsu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
