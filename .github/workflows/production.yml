name: Build & Release

on:
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub UI
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # TODO: Update to 24 because of deprecation issues.
          node-version: 20 # Match your local dev version

      - name: Cache Dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci # 'npm ci' is cleaner for automated builds

      - name: Build, Package and Release
        # electron-builder reads the --publish flag and pushes straight to GitHub Releases
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
