name: Validation

on:
  push:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Disabled for now.
        run: echo "Quality checks are disabled for the moment."
      # - name: Checkout
      #   uses: actions/checkout@v4

      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20

      # - name: Install dependencies
      #   run: npm ci --ignore-scripts

      # - name: Type Check
      #   run: tsc --project tsconfig.check.json

      # - name: Run Tests with Coverage
      #   run: npm test -- --coverage

  tag:
    name: Tag with package.json version
    runs-on: ubuntu-22.04
    needs: quality-check
    permissions:
      contents: write
    outputs:
      tag-created: ${{ steps.create_tag.outputs.tag-created }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Create tag
        id: create_tag
        uses: actions/github-script@v8
        with:
          script: |
            const tag = `v${{ steps.package-version.outputs.current-version}}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              console.log(`Tag ${tag} created successfully.`);
              core.setOutput('tag-created', 'true');
            } catch (err) {
              if (err.status === 422) {
                console.log(`Tag for version "${tag}" already exists. Skipping tag creation.`);
                core.setOutput('tag-created', 'false');
              } else {
                throw err;
              }
            }
          retries: 5
          retry-exempt-status-codes: 400,401,403,404,422
          result-encoding: json
      - name: Echo tag-created
        run: |
          echo "tag-created: ${{ steps.create_tag.outputs.tag-created }}"
